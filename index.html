<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>193-Mahbubnagar SIR 2002 Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #64748b;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
        }

        .card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: var(--primary); }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin: 5px 0; }
        .disclaimer { 
            font-size: 0.8rem; 
            background: #fff1f2; 
            color: #be123c; 
            padding: 10px; 
            border-radius: 8px;
            border: 1px solid #fecdd3;
            margin-top: 15px;
        }

        .status-bar { 
            text-align: center; 
            font-size: 0.85rem; 
            margin-bottom: 25px; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .loading { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .ready { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        
        .search-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
            background: #f1f5f9;
            padding: 20px;
            border-radius: 15px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.8rem; font-weight: 600; color: var(--secondary); margin-left: 5px; }

        input { 
            padding: 12px 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            outline: none; 
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-search { 
            padding: 12px 30px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            margin-top: auto;
        }
        .btn-search:hover { background: var(--primary-dark); }

        .table-container { 
            overflow-x: auto; 
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        
        th { 
            background: #f8fafc; 
            padding: 15px; 
            text-align: left; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            color: var(--secondary);
            border-bottom: 2px solid #e2e8f0;
        }

        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        tr:hover { background: #f8fafc; }
        
        .telugu-text { 
            font-family: 'Noto Sans Telugu', sans-serif; 
            color: var(--text-main); 
            font-size: 1.05rem; 
            font-weight: 500;
        }

        .badge-ps { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; }
        .house-no { font-weight: 700; color: var(--primary); }
        .epic-no { font-family: monospace; font-weight: 600; color: #d97706; }

        @media (max-width: 600px) {
            .search-grid { grid-template-columns: 1fr; }
            .card { padding: 15px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header-section">
            <h1>193 - Mahbubnagar Voter Search</h1>
            <p class="subtitle">Special Intensive Revision (SIR) – 2002 Last Data</p>
            <p class="subtitle" style="font-size: 0.8rem;">Source: https://voters.eci.gov.in/</p>
            <div class="disclaimer">
                <b>Disclaimer:</b> Internal use only. Developer: Nawaz Ahmed (nawazitcore@gmail.com)
            </div>
        </div>

        <div id="status" class="status-bar loading">📥 Loading Database...</div>

        <div class="search-grid">
            <div class="input-group">
                <label>Elector / Relation Name</label>
                <input type="text" id="nameInput" placeholder="Enter Telugu name...">
            </div>
            <div class="input-group">
                <label>House Number</label>
                <input type="text" id="houseInput" placeholder="e.g. 5-3-52">
            </div>
            <div class="input-group">
                <label>EPIC Number</label>
                <input type="text" id="epicInput" placeholder="Enter EPIC Card ID">
            </div>
            <button class="btn-search" onclick="doSearch()">🔍 Search</button>
        </div>

        <div class="table-container">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>PS</th>
                        <th>Sl</th>
                        <th>House No</th>
                        <th>Elector Name</th>
                        <th>Relation Name</th>
                        <th>Age</th>
                        <th>EPIC Card</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let db = null;

    async function init() {
        try {
            const sqlPromise = initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            const dataPromise = fetch("VoterData_193.db").then(res => {
                if(!res.ok) throw new Error("Database file not found!");
                return res.arrayBuffer();
            });

            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            db = new SQL.Database(new Uint8Array(buf));
            
            document.getElementById('status').innerText = "✅ Database Ready! Search now.";
            document.getElementById('status').className = "status-bar ready";
        } catch (err) {
            document.getElementById('status').innerText = "❌ Error: " + err.message;
            document.getElementById('status').style.background = "#fee2e2";
        }
    }

    function doSearch() {
        if (!db) return;
        
        const nameVal = document.getElementById('nameInput').value.trim();
        const houseVal = document.getElementById('houseInput').value.trim();
        const epicVal = document.getElementById('epicInput').value.trim();
        const tbody = document.querySelector("#resultTable tbody");
        tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; padding: 20px;'>Searching...</td></tr>";

        let query = "SELECT * FROM voters WHERE 1=1";
        if(nameVal) query += ` AND (Elector_Name LIKE '%${nameVal}%' OR Relation_Name LIKE '%${nameVal}%')`;
        if(houseVal) query += ` AND House_No LIKE '%${houseVal}%'`;
        if(epicVal) query += ` AND EPIC_No LIKE '%${epicVal}%'`;
        query += " LIMIT 250";

        try {
            const results = db.exec(query);
            tbody.innerHTML = "";

            if (results.length > 0) {
                results[0].values.forEach(row => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td><span class="badge-ps">${row[0]}</span></td>
                        <td>${row[1]}</td>
                        <td><span class="house-no">${row[3]}</span></td>
                        <td class="telugu-text">${row[4]}</td>
                        <td class="telugu-text">${row[6]}</td>
                        <td><b>${row[8]}</b></td>
                        <td><span class="epic-no">${row[9] || '-'}</span></td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; padding: 20px;'>No matching records found.</td></tr>";
            }
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan='7' style='text-align:center; color: red;'>Query Error: ${err.message}</td></tr>`;
        }
    }

    init();
</script>

</body>
</html>
