<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>193-Mahbubnagar Voter Search</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --success-color: #059669;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: #f1f5f9; 
            padding: 10px; 
            margin: 0;
            color: #1e293b;
        }

        .card { 
            max-width: 1000px; 
            margin: 10px auto; 
            background: white; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        header { text-align: center; margin-bottom: 25px; }
        
        h2 { 
            margin: 0; 
            color: #0f172a; 
            font-size: 1.5rem; 
            letter-spacing: -0.5px;
        }

        .developer-info {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 15px 0;
            border: 1px dashed #cbd5e1;
            line-height: 1.4;
        }

        .developer-info b { color: var(--primary-color); }

        .status-bar { 
            text-align: center; 
            font-size: 0.85rem; 
            margin-bottom: 20px; 
            padding: 10px; 
            border-radius: 8px; 
            font-weight: 500;
        }
        .loading { background: #fef3c7; color: #92400e; }
        .ready { background: #dcfce7; color: #166534; }
        
        .search-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 20px; 
        }

        @media (min-width: 600px) {
            .search-grid { flex-direction: row; }
        }

        input { 
            padding: 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            outline: none; 
            font-size: 1rem;
            transition: 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--primary-color); background: #fff; }

        button { 
            padding: 14px 25px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover { background: var(--secondary-color); }

        /* Table Container for Mobile */
        .table-container { 
            overflow-x: auto; 
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 600px; /* Force scroll on small screens */
            background: #fff;
        }

        th { 
            background: #f8fafc; 
            padding: 12px; 
            text-align: left; 
            font-size: 0.85rem; 
            color: #64748b;
            text-transform: uppercase;
        }

        td { 
            padding: 14px 12px; 
            border-top: 1px solid #f1f5f9; 
            font-size: 0.95rem;
        }

        .telugu-text { 
            font-family: 'Gautami', sans-serif; 
            color: #0f172a; 
            font-weight: 500;
        }

        .epic-badge {
            font-family: monospace;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h2>Voter List Search (193 - Mahbubnagar)</h2>
        <div class="developer-info">
            Developed by: <b>Nawaz Ahmed</b><br>
            📧 <a href="mailto:nawazitcore@gmail.com" style="text-decoration:none; color:inherit;">nawazitcore@gmail.com</a>
        </div>
    </header>

    <div id="status" class="status-bar loading">📥 Loading Database...</div>

    <div class="search-grid">
        <input type="text" id="nameInput" placeholder="Name / Relation Name">
        <input type="text" id="houseInput" placeholder="House No (e.g. 6-1-52)">
        <button onclick="doSearch()">Search</button>
    </div>

    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>PS</th>
                    <th>Sl</th>
                    <th>House No</th>
                    <th>Elector Name</th>
                    <th>Relation</th>
                    <th>Age</th>
                    <th>EPIC No</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let db = null;

    async function init() {
        try {
            const sqlPromise = initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}` });
            const dataPromise = fetch("VoterData_193.db").then(res => res.arrayBuffer());

            const [SQL, buf] = await Promise.all([sqlPromise, dataPromise]);
            db = new SQL.Database(new Uint8Array(buf));
            
            document.getElementById('status').innerText = "✅ Database Ready! Search now.";
            document.getElementById('status').className = "status-bar ready";
        } catch (err) {
            document.getElementById('status').innerText = "❌ Database Error";
        }
    }

    function doSearch() {
        if (!db) return;
        const nameVal = document.getElementById('nameInput').value.trim();
        const houseVal = document.getElementById('houseInput').value.trim();
        const tbody = document.querySelector("#resultTable tbody");
        
        let query = "SELECT * FROM voters WHERE 1=1";
        if(nameVal) query += ` AND (Elector_Name LIKE '%${nameVal}%' OR Relation_Name LIKE '%${nameVal}%')`;
        if(houseVal) query += ` AND House_No LIKE '%${houseVal}%'`;
        query += " LIMIT 150";

        const results = db.exec(query);
        tbody.innerHTML = "";

        if (results.length > 0) {
            results[0].values.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="color:#64748b">${row[0]}</td>
                    <td>${row[1]}</td>
                    <td><b>${row[3]}</b></td>
                    <td class="telugu-text">${row[4]}</td>
                    <td class="telugu-text">${row[6]}</td>
                    <td>${row[8]}</td>
                    <td><span class="epic-badge">${row[9] || '-'}</span></td>
                `;
                tbody.appendChild(tr);
            });
        } else {
            tbody.innerHTML = "<tr><td colspan='7' style='text-align:center; padding:20px; color:#94a3b8;'>No records found.</td></tr>";
        }
    }
    init();
</script>

</body>
</html>
